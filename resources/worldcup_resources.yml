# Databricks Asset Bundle: App + scheduled sync job.
# Set bundle variables (or override in target) and configure secrets in the workspace.

resources:
  apps:
    worldcup_pool_app:
      name: "worldcup-pool-${bundle.target}"
      description: "World Cup 2026 prediction pool (FastAPI + React + Lakebase)"
      source_code_path: ..

  jobs:
    worldcup_sync_matches:
      name: "[${bundle.target}] worldcup sync matches"
      max_concurrent_runs: 1
      schedule:
        # Every 5 minutes so live scores and newly published knockout fixtures appear quickly.
        quartz_cron_expression: "0 0/5 * * * ?"
        timezone_id: "UTC"
      environments:
        - environment_key: sync_matches_env
          spec:
            environment_version: "5"
            dependencies:
              - databricks-sdk>=0.81.0
              - sqlalchemy>=2.0.0
              - psycopg[binary]>=3.2.0
              - httpx>=0.27.0
        - environment_key: lakebase_to_delta_env
          spec:
            environment_version: "5"
            dependencies:
              - databricks-sdk>=0.81.0
              - sqlalchemy>=2.0.0
              - psycopg[binary]>=3.2.0
      tasks:
        - task_key: sync_matches
          environment_key: sync_matches_env
          spark_python_task:
            python_file: ../scripts/databricks_sync.py
            parameters:
              - "LAKEBASE_ENDPOINT=${var.lakebase_endpoint}"
              - "FOOTBALL_DATA_COMPETITION=${var.football_data_competition}"
              - "LAKEBASE_DATABASE=databricks_postgres"
              - "PREDICTION_LOCK_BEFORE_KICKOFF_HOURS=1"

        - task_key: lakebase_to_delta
          depends_on:
            - task_key: sync_matches
          environment_key: lakebase_to_delta_env
          spark_python_task:
            python_file: ../scripts/databricks_lakebase_to_delta.py
            parameters:
              - "LAKEBASE_ENDPOINT=${var.lakebase_endpoint}"
              - "LAKEBASE_DATABASE=databricks_postgres"
              - "DEMO_CATALOG=${var.demo_catalog}"
              - "DEMO_SCHEMA=${var.demo_schema}"
